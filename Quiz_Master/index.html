<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Time!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="app-title">Quiz Master</h1>
    <div class="container">

      <!-- Start Screen -->
      <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your knowledge with our fun quiz. Answer all questions and see how well you do!</p>
        <button id="start-btn">Start Quiz</button>
      </div>

      <!-- Quiz Screen -->
      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <div class="quiz-meta">
            <span>Question <span id="current-question">1</span> of <span id="total-questions">10</span></span>
            <span>Score: <span id="score">0</span></span>
          </div>
          <p id="question-text">Question goes here</p>
        </div>

        <div id="answers-container"></div>

        <div class="progress-bar">
          <div id="progress"></div>
        </div>
      </div>

      <!-- Result Screen -->
      <div class="screen" id="result-screen">
        <h2>Quiz Results</h2>
        <p>You scored <span id="final-score">0</span> out of <span id="max-score">10</span></p>
        <p id="result-message">Well done!</p>
        <button id="restart-btn">Play Again</button>
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
